; ── PHP runtime settings for Laravel ─────────────────────────────────────────
[PHP]
; Maximum upload file size (match nginx client_max_body_size)
upload_max_filesize = 20M
post_max_size       = 25M

; Memory limit — increase for image processing (GD)
memory_limit = 256M

; Execution limits
max_execution_time = 60
max_input_time     = 60

; Timezone — adjust as needed
date.timezone = "Africa/Algiers"

; Error handling (overridden by APP_DEBUG in Laravel)
display_errors  = Off
log_errors      = On
error_log       = /proc/self/fd/2

; Session
session.gc_maxlifetime = 1800
