; ── OPcache — optimised for Laravel in production ────────────────────────────
[opcache]
opcache.enable                  = 1
opcache.enable_cli              = 0

; Memory allocated to OPcache (MB)
opcache.memory_consumption      = 128

; Maximum number of cached files
opcache.max_accelerated_files   = 10000

; Revalidation interval (seconds) - set to 0 in development, 60+ in production
opcache.revalidate_freq         = 0

; Verify timestamps (set to 0 in production for better performance)
opcache.validate_timestamps     = 1

; Intern all strings
opcache.interned_strings_buffer = 16

; Cache the file-existence checks
opcache.enable_file_override    = 0

; Save precompiled scripts on shutdown
opcache.fast_shutdown           = 1
