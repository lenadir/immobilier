server {
    listen 80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    charset utf-8;

    # ── Logging ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;
    gzip_min_length 1024;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;

    # ── Static assets (images, fonts, JS, CSS) ───────────────────────────────
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff2?|ttf|otf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── Laravel — send all requests to index.php ─────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ──────────────────────────────────────────────────────────────
    location ~ \.php$ {
        fastcgi_pass           app:9000;
        fastcgi_index          index.php;
        fastcgi_buffers        8 16k;
        fastcgi_buffer_size    32k;

        include                fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT   $realpath_root;

        # Forward real client IP when behind a proxy / load balancer
        fastcgi_param HTTP_X_REAL_IP     $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────────────────────────
    location ~ /\.(?!well-known).* {
        deny all;
        return 404;
    }

    # ── Increase client body size for image uploads ──────────────────────────
    client_max_body_size 20M;
}
