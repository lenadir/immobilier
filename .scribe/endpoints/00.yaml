name: Authentification
description: |-

  Gestion de l'inscription, connexion et déconnexion via Laravel Sanctum.
  Les routes d'inscription et de connexion sont publiques (sans token).
endpoints:
  -
    httpMethods:
      - POST
    uri: api/auth/register
    metadata:
      groupName: Authentification
      groupDescription: |-

        Gestion de l'inscription, connexion et déconnexion via Laravel Sanctum.
        Les routes d'inscription et de connexion sont publiques (sans token).
      subgroup: ''
      subgroupDescription: ''
      title: Inscription
      description: 'Crée un nouveau compte utilisateur et retourne un token Sanctum.'
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {VOTRE_TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      name:
        name: name
        description: 'Nom complet.'
        required: true
        example: 'Karim Benamara'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      email:
        name: email
        description: 'Adresse email unique.'
        required: true
        example: karim@example.com
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      password:
        name: password
        description: 'Mot de passe (min 8 car., majuscule + chiffre).'
        required: true
        example: Secret@123
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      role:
        name: role
        description: 'Rôle demandé : agent ou guest. Défaut: guest.'
        required: false
        example: agent
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      phone:
        name: phone
        description: 'Numéro de téléphone.'
        required: false
        example: '+213 555 123456'
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: true
        custom: []
      password_confirmation:
        name: password_confirmation
        description: 'Confirmation du mot de passe.'
        required: true
        example: Secret@123
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanBodyParameters:
      name: 'Karim Benamara'
      email: karim@example.com
      password: Secret@123
      role: agent
      phone: '+213 555 123456'
      password_confirmation: Secret@123
    fileParameters: []
    responses:
      -
        status: 201
        content: |-
          {
            "message": "Inscription réussie.",
            "user": { "id": 5, "name": "Karim Benamara", "email": "karim@example.com", "role": "agent" },
            "token": "5|aBcDeFgHiJkLmNoPqRsTuVwXyZ..."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 422
        content: '{ "message": "Les données fournies sont invalides.", "errors": { "email": ["Cette adresse email est déjà utilisée."] } }'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer vaeZ6cDad5f3VbP1kg86hE4'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - POST
    uri: api/auth/login
    metadata:
      groupName: Authentification
      groupDescription: |-

        Gestion de l'inscription, connexion et déconnexion via Laravel Sanctum.
        Les routes d'inscription et de connexion sont publiques (sans token).
      subgroup: ''
      subgroupDescription: ''
      title: Connexion
      description: |-
        Authentifie l'utilisateur et retourne un token Sanctum Bearer.
        L'ancien token est révoqué à chaque connexion.
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {VOTRE_TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters:
      email:
        name: email
        description: 'Adresse email.'
        required: true
        example: admin@immobilier.dz
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
      password:
        name: password
        description: 'Mot de passe.'
        required: true
        example: Admin@12345
        type: string
        enumValues: []
        exampleWasSpecified: true
        nullable: false
        custom: []
    cleanBodyParameters:
      email: admin@immobilier.dz
      password: Admin@12345
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "message": "Connexion réussie.",
            "user": { "id": 1, "name": "Administrateur", "email": "admin@immobilier.dz", "role": "admin" },
            "token": "1|xYzAbCdEfGhIjKlMnOpQrStUvWx..."
          }
        headers: []
        description: ''
        custom: []
      -
        status: 401
        content: '{ "message": "Identifiants invalides." }'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 5g6kZabd8v16VPEecDfah34'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - POST
    uri: api/auth/logout
    metadata:
      groupName: Authentification
      groupDescription: |-

        Gestion de l'inscription, connexion et déconnexion via Laravel Sanctum.
        Les routes d'inscription et de connexion sont publiques (sans token).
      subgroup: ''
      subgroupDescription: ''
      title: Déconnexion
      description: "Révoque le token courant de l'utilisateur connecté."
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {VOTRE_TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: '{ "message": "Déconnexion réussie." }'
        headers: []
        description: ''
        custom: []
      -
        status: 401
        content: '{ "message": "Non authentifié." }'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer dhv3ea6bPZakD845c6VEgf1'
    controller: null
    method: null
    route: null
    custom: []
  -
    httpMethods:
      - GET
    uri: api/auth/me
    metadata:
      groupName: Authentification
      groupDescription: |-

        Gestion de l'inscription, connexion et déconnexion via Laravel Sanctum.
        Les routes d'inscription et de connexion sont publiques (sans token).
      subgroup: ''
      subgroupDescription: ''
      title: 'Profil connecté'
      description: "Retourne le profil de l'utilisateur actuellement connecté."
      authenticated: true
      custom: []
    headers:
      Authorization: 'Bearer {VOTRE_TOKEN_SANCTUM}'
      Content-Type: application/json
      Accept: application/json
    urlParameters: []
    cleanUrlParameters: []
    queryParameters: []
    cleanQueryParameters: []
    bodyParameters: []
    cleanBodyParameters: []
    fileParameters: []
    responses:
      -
        status: 200
        content: |-
          {
            "id": 1, "name": "Administrateur", "email": "admin@immobilier.dz",
            "role": "admin", "phone": null, "is_active": true
          }
        headers: []
        description: ''
        custom: []
      -
        status: 401
        content: '{ "message": "Non authentifié." }'
        headers: []
        description: ''
        custom: []
    responseFields: []
    auth:
      - headers
      - Authorization
      - 'Bearer 6365vbfe4aakdEZgVcP81Dh'
    controller: null
    method: null
    route: null
